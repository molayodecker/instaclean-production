name: Supa-backup

on:
  push:
    branches: [main]
    paths-ignore:
      - "roles.sql"
      - "schema.sql"
      - "data.sql.gz"
      - "schema.sql.gz"
      - "exports/**"

  pull_request:
    branches: [main]
    paths-ignore:
      - "roles.sql"
      - "schema.sql"
      - "data.sql.gz"
      - "schema.sql.gz"
      - "exports/**"

  workflow_dispatch:

  schedule:
    - cron: "0 0 * * *" # daily at midnight UTC

concurrency:
  group: supabase-backups
  cancel-in-progress: false

jobs:
  run_db_backup:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      BACKUP_ENABLED: ${{ secrets.BACKUP_ENABLED }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

    steps:
      - name: Check backup prerequisites
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          if [ "${BACKUP_ENABLED:-false}" != "true" ]; then
            echo "Backups disabled. Set BACKUP_ENABLED=true in repository secrets to run."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "::error::SUPABASE_DB_URL secret is missing or empty."
            echo "::error::Add your postgresql:// connection URI under Settings → Secrets and variables → Actions."
            exit 1
          fi

          python3 -c "import os, urllib.parse; u=os.environ['SUPABASE_DB_URL']; p=urllib.parse.urlparse(u); assert p.scheme in ('postgresql', 'postgres') and p.hostname, 'SUPABASE_DB_URL must be a postgresql:// URI with a host'"

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Determine backup mode
        id: mode
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          EVENT="${{ github.event_name }}"
          SAME_REPO_PR="false"

          if [ "$EVENT" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            SAME_REPO_PR="true"
          fi

          if [ "$EVENT" = "schedule" ] || [ "$EVENT" = "workflow_dispatch" ] || [ "$SAME_REPO_PR" = "true" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "upload_to_r2=true" >> "$GITHUB_OUTPUT"
            echo "Running FULL backup"
          else
            echo "mode=schema" >> "$GITHUB_OUTPUT"
            echo "upload_to_r2=false" >> "$GITHUB_OUTPUT"
            echo "Running SCHEMA + SAFE CONFIG backup"
          fi

          echo "upload_ddl_to_r2=true" >> "$GITHUB_OUTPUT"

      - name: Checkout main branch
        if: steps.gate.outputs.enabled == 'true' && github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Checkout repository for PR validation
        if: steps.gate.outputs.enabled == 'true' && github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Supabase CLI
        if: steps.gate.outputs.enabled == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL 17 client and AWS CLI
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release ca-certificates python3-pip

          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list

          wget -qO - https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | gpg --dearmor \
            | sudo tee /etc/apt/trusted.gpg.d/postgresql.gpg > /dev/null

          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

          python3 -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          /usr/lib/postgresql/17/bin/pg_dump --version
          /usr/lib/postgresql/17/bin/psql --version
          "$HOME/.local/bin/aws" --version

      - name: Force IPv4 for Supabase host
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          HOST=$(python3 -c "import os, urllib.parse; print(urllib.parse.urlparse(os.environ['SUPABASE_DB_URL']).hostname or '')")

          echo "Host: $HOST"

          if [ -z "$HOST" ]; then
            echo "::error::Could not parse hostname from SUPABASE_DB_URL"
            exit 1
          fi

          IPV4=$(getent ahostsv4 "$HOST" | awk '/RAW/ {print $1; exit}')

          if [ -z "$IPV4" ]; then
            echo "::error::Could not resolve IPv4 for $HOST"
            exit 1
          fi

          echo "IPv4: $IPV4"

          if [[ "$SUPABASE_DB_URL" == *\?* ]]; then
            SEP="&"
          else
            SEP="?"
          fi

          echo "SUPABASE_DB_URL_IPV4=${SUPABASE_DB_URL}${SEP}sslmode=require&hostaddr=${IPV4}" >> "$GITHUB_ENV"

      - name: Dump roles and schema
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p exports

          supabase db dump \
            --db-url "$SUPABASE_DB_URL_IPV4" \
            -f roles.sql \
            --role-only

          supabase db dump \
            --db-url "$SUPABASE_DB_URL_IPV4" \
            -f schema.sql

      - name: Dump functions and triggers
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p exports

          /usr/lib/postgresql/17/bin/psql "$SUPABASE_DB_URL_IPV4" \
            -v ON_ERROR_STOP=1 \
            -q \
            -f scripts/dump_functions_triggers.sql

      - name: Export safe config tables to compressed SQL file
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p exports

          /usr/lib/postgresql/17/bin/pg_dump "$SUPABASE_DB_URL_IPV4" \
            --data-only \
            --inserts \
            --table=public.base_durations \
            --table=public.booking_settings \
            --table=public.discounts \
            --table=public.extra_tasks \
            --table=public.roles \
            --table=public.service_categories \
            --table=public.service_types \
            --table=public.timezones \
            | gzip > exports/config_data.sql.gz

      - name: Dump full data
        if: steps.gate.outputs.enabled == 'true' && steps.mode.outputs.mode == 'full'
        shell: bash
        run: |
          set -euo pipefail

          supabase db dump \
            --db-url "$SUPABASE_DB_URL_IPV4" \
            --data-only \
            --use-copy \
            | gzip > data.sql.gz

          rm -f data.sql

      - name: Show generated files
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "Generated backup files:"
          ls -lh roles.sql schema.sql exports/functions_triggers.sql exports/config_data.sql.gz || true
          ls -lh data.sql.gz || true

      - name: Commit schema, roles, functions/triggers, and safe config data to GitHub
        if: steps.gate.outputs.enabled == 'true' && github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: database backup [skip ci]"
          file_pattern: "roles.sql schema.sql exports/functions_triggers.sql exports/config_data.sql.gz"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

      - name: Upload schema, functions/triggers, and safe config data to Cloudflare R2
        if: >
          steps.gate.outputs.enabled == 'true' &&
          steps.mode.outputs.upload_ddl_to_r2 == 'true' &&
          env.R2_BUCKET_NAME != '' &&
          env.R2_ACCOUNT_ID != ''
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "::warning::R2 credentials are missing. Skipping R2 upload."
            exit 0
          fi

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          DATE=$(date -u +%Y-%m-%d)
          RUN_ID="${{ github.run_id }}"
          PREFIX="s3://$R2_BUCKET_NAME/$DATE/$RUN_ID"

          gzip -c schema.sql > schema.sql.gz
          gzip -c roles.sql > roles.sql.gz
          gzip -c exports/functions_triggers.sql > exports/functions_triggers.sql.gz

          aws s3 cp schema.sql.gz \
            "$PREFIX/schema.sql.gz" \
            --endpoint-url "$ENDPOINT"

          aws s3 cp roles.sql.gz \
            "$PREFIX/roles.sql.gz" \
            --endpoint-url "$ENDPOINT"

          aws s3 cp exports/functions_triggers.sql.gz \
            "$PREFIX/functions_triggers.sql.gz" \
            --endpoint-url "$ENDPOINT"

          aws s3 cp exports/config_data.sql.gz \
            "$PREFIX/config_data.sql.gz" \
            --endpoint-url "$ENDPOINT"

      - name: Upload full data backup to Cloudflare R2
        if: >
          steps.gate.outputs.enabled == 'true' &&
          steps.mode.outputs.upload_to_r2 == 'true' &&
          env.R2_BUCKET_NAME != '' &&
          env.R2_ACCOUNT_ID != ''
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          set -euo pipefail

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "::error::R2 credentials are missing. Full data backup cannot be uploaded."
            exit 1
          fi

          if [ ! -f data.sql.gz ]; then
            echo "::error::data.sql.gz was not generated."
            exit 1
          fi

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          DATE=$(date -u +%Y-%m-%d)
          RUN_ID="${{ github.run_id }}"
          PREFIX="s3://$R2_BUCKET_NAME/$DATE/$RUN_ID"

          aws s3 cp data.sql.gz \
            "$PREFIX/data.sql.gz" \
            --endpoint-url "$ENDPOINT"
